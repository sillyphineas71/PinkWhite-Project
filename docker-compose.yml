services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: matchmaking
      POSTGRES_PASSWORD: match_password
      POSTGRES_USER: match_user
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U match_user -d matchmaking"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
